name: Build and Push Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "assets/**"
      - "config/**"
      - "docker/**"
      - ".github/workflows/docker-images.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: teachingopen-app
            dockerfile: docker/app/Dockerfile
          - image_name: teachingopen-web
            dockerfile: docker/web/Dockerfile
          - image_name: teachingopen-mysql
            dockerfile: docker/mysql/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify bundled assets
        run: |
          git lfs ls-files

          if head -n 1 assets/teaching-open-web-2.8.0.zip | grep -q "git-lfs.github.com/spec/v1"; then
            echo "Frontend zip is still a Git LFS pointer, not the real file." >&2
            exit 1
          fi

          if head -n 1 assets/teaching-open-2.8.0.jar | grep -q "git-lfs.github.com/spec/v1"; then
            echo "Backend jar is still a Git LFS pointer, not the real file." >&2
            exit 1
          fi

          unzip -tq assets/teaching-open-web-2.8.0.zip >/dev/null
          unzip -tq assets/teaching-open-2.8.0.jar >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=2.8.0
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
