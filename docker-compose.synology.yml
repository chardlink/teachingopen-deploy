services:
  mysql:
    image: ${MYSQL_IMAGE:-chardchao/teachingopen-mysql:2.8.0}
    container_name: teachingopen-mysql
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-change-this-root-password}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-teachingopen}"
      MYSQL_USER: "${MYSQL_USER:-teachingopen}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-change-this-app-password}"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - teachingopen

  redis:
    image: redis:6.2-alpine
    container_name: teachingopen-redis
    restart: unless-stopped
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}" --save 60 1
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-change-this-redis-password}"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - teachingopen

  app:
    image: ${APP_IMAGE:-chardchao/teachingopen-app:2.8.0}
    container_name: teachingopen-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      JAVA_OPTS: "${JAVA_OPTS:--Xms512m -Xmx2048m -Dfile.encoding=UTF-8}"
      TEACHING_DOMAIN: "${PUBLIC_BASE_URL:-http://192.168.1.100:8080}"
      FILE_VIEW_DOMAIN: "${PUBLIC_BASE_URL:-http://192.168.1.100:8080}/preview"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: "${MYSQL_DATABASE:-teachingopen}"
      DB_USER: "${MYSQL_USER:-teachingopen}"
      DB_PASS: "${MYSQL_PASSWORD:-change-this-app-password}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-change-this-redis-password}"
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/webapp:/data/webapp
      - ./data/logs:/data/logs
    networks:
      - teachingopen

  kkfileview:
    image: keking/kkfileview:latest
    container_name: teachingopen-kkfileview
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - ./data/kkfileview:/opt/kkFileView
    networks:
      - teachingopen

  nginx:
    image: ${WEB_IMAGE:-chardchao/teachingopen-web:2.8.0}
    container_name: teachingopen-nginx
    restart: unless-stopped
    depends_on:
      - app
      - kkfileview
    ports:
      - "${WEB_PORT:-8080}:80"
    networks:
      - teachingopen

networks:
  teachingopen:
    driver: bridge
