server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html index.htm;
    client_max_body_size 1024m;

    # Scratch custom assets are uploaded by the backend to /data/uploads/internalapi/asset.
    # Expose them under the paths expected by the bundled Scratch frontend.
    location ^~ /scratch3/static/internalapi/asset/ {
        alias /data/uploads/internalapi/asset/;
        access_log off;
        expires 30d;
    }

    # Keep compatibility with records or frontend code that still points at /internalapi/asset/.
    location ^~ /internalapi/asset/ {
        alias /data/uploads/internalapi/asset/;
        access_log off;
        expires 30d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3600s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 3600s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /preview/ {
        proxy_pass http://kkfileview:8012/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3600s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 3600s;
    }
}
